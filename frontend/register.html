<!DOCTYPE html>
<html>
<head>
  <title>Bank IB - Register</title>
</head>

<body style="font-family: Arial; max-width:400px; margin:auto; padding:20px;">

  <h2>Create Your Account</h2>

  <form id="form">

    <input placeholder="First Name" id="firstName" required /><br><br>
    <input placeholder="Last Name" id="lastName" required /><br><br>
    <input placeholder="Address" id="address" required /><br><br>
    <input type="password" placeholder="PIN" id="pin" required /><br><br>

    <button type="submit">Register</button>

  </form>

  <p id="msg"></p>

  <script>

    // 🔐 SECURE TOKEN INJECTED FROM BACKEND
    const token = "{{TOKEN}}"

    const form = document.getElementById("form")

    form.addEventListener("submit", async (e) => {
      e.preventDefault()

      const msg = document.getElementById("msg")
      msg.innerText = "Processing..."

      try{

        const body = {
          token,
          firstName: document.getElementById("firstName").value,
          lastName: document.getElementById("lastName").value,
          address: document.getElementById("address").value,
          pin: document.getElementById("pin").value
        }

        // 🔥 REGISTER (AND CREATE ACCOUNT INSIDE BACKEND)
        const res = await fetch("/api/whatsapp?action=register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        })

        const data = await res.json()

        if(!data.success){
          msg.innerText = "❌ " + (data.error || "Registration failed")
          return
        }

        const result = data.data

        msg.innerText = "✅ Registration successful"

        // 🔥 SEND WEBHOOK TO INFOBIP
        try{
          await fetch('https://api2.infobip.com/bots/webhook/${sessionId}', {
            method:"POST",
            headers:{
              "Content-Type":"application/json"
            },
            body: JSON.stringify({
              event:"USER_REGISTERED",
              phone: result.phone,
              firstName: result.firstName,
              lastName: result.lastName,
              accountNumber: result.accountNumber
            })
          })
        }catch(e){
          console.log("Webhook failed (non-blocking)")
        }

        // 🔄 REDIRECT BACK TO WHATSAPP WITH MESSAGE
        setTimeout(() => {
          window.location.href =
            `https://wa.me/2347073334607`
            
        }, 2000)

      }catch(err){
        msg.innerText = "❌ Something went wrong"
      }

    })

  </script>

</body>
</html>
