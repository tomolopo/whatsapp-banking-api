openapi: 3.0.0
info:
  title: WhatsApp Banking API
  version: 1.0.0
  description: API used by Infobip Answers chatbot

servers:
  - url: https://whatsapp-banking-api.vercel.app

paths:

  /api/whatsapp:
    post:
      summary: WhatsApp Banking Router
      description: |
        This endpoint handles all WhatsApp banking actions.
        Use the `action` query parameter to specify operation.

      parameters:
        - in: query
          name: action
          required: true
          schema:
            type: string
            enum:
              - register
              - balance
              - banks
              - account-name
              - request-transfer
              - confirm-transfer
              - receipt

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:

                phone:
                  type: string
                  example: "2348012345678"

                name:
                  type: string
                  example: "John Doe"

                accountNumber:
                  type: string
                  example: "0123456789"

                fromAccount:
                  type: string
                  example: "0123456789"

                toAccount:
                  type: string
                  example: "0987654321"

                amount:
                  type: number
                  example: 5000

                otp:
                  type: string
                  example: "123456"

      responses:

        "200":
          description: Successful response

        "400":
          description: Invalid request

        "500":
          description: Server error